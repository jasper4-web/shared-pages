      <h1>Industry blueprints</h1>
      <p class="sub">Choose your industry to see what's inside its blueprint.</p>

<script src="industries.js"></script>
<script>
(function () {
  var IND = window.SANO_INDUSTRIES || [];
  var slug = new URLSearchParams(location.search).get('ind');
  var d = IND.filter(function (x) { return x.slug === slug; })[0];
  var root = document.getElementById('ind-root');

  if (!d) { location.replace('industries.html'); return; }

  document.title = d.label + ' — your AI department, already built | SANO Systems';
  var md = document.querySelector('meta[name="description"]');
  if (md) md.setAttribute('content', d.sub);
  var canon = document.getElementById('canon');
  if (canon) canon.setAttribute('href', 'industry.html?ind=' + d.slug);

  var check = '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>';
  var ex = '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';

  var others = IND.filter(function (x) { return x.slug !== d.slug; }).slice(0, 4).map(function (i) {
    return '<a class="ind reveal" href="industry.html?ind=' + i.slug + '"><div class="em" aria-hidden="true">' + i.em + '</div><h3>' + i.label + '</h3><p>' + i.tag + '</p><span class="more">See the blueprint &rarr;</span></a>';
  }).join('');

  root.innerHTML =
    '<section class="page-hero tint"><div class="wrap reveal">' +
      '<span class="eyebrow"><span aria-hidden="true">' + d.em + '</span> ' + d.label + '</span>' +
      '<h1>' + d.headline + '</h1>' +
      '<p class="sub">' + d.sub + '</p>' +
      '<div class="hero-cta"><a href="demo.html?ind=' + d.slug + '" class="btn btn-blue btn-lg">Book a demo</a>' +
      '<a href="#blueprint" class="btn btn-ghost btn-lg">See what&rsquo;s inside</a></div>' +
    '</div></section>' +

    '<section class="band" id="blueprint"><div class="wrap">' +
      '<div class="sec-head reveal"><span class="blueprint">&#10022; The ' + d.label + ' blueprint</span>' +
      '<h2 style="margin-top:16px">What&rsquo;s actually inside it</h2>' +
      '<p>We don&rsquo;t start from a blank page. This is the setup we&rsquo;ve built for your trade &mdash; we shape it to how you work, you approve it, then we run it.</p></div>' +
      '<div class="feat-grid">' +
        d.blueprint.map(function (b, i) {
          return '<div class="feat reveal"><div class="ic" aria-hidden="true">' + (i + 1) + '</div><h3 style="font-size:17px">' + b + '</h3></div>';
        }).join('') +
      '</div>' +
      '<p class="blueprint-season reveal">' + d.season + '</p>' +
      '<p class="price-strip reveal">Blueprints start at <strong>$397/mo</strong> plus a one-time fee to stand it up. Text-back and messaging on every plan; live voice answering from Growth. <a href="pricing.html">See the four levels &rarr;</a></p>' +
    '</div></section>' +

    '<section class="band paper"><div class="wrap">' +
      '<div class="sec-head reveal"><p class="kick">Why it&rsquo;s built that way</p><h2>The problems it was shaped around</h2></div>' +
      '<div class="journey open" style="margin-top:0"><div class="journey-body">' +
        '<div class="journey-grid">' +
          '<div class="j-col"><h3 class="j-h">What&rsquo;s costing you today</h3><ul class="j-list j-pain">' +
            d.pains.map(function (p) { return '<li>' + ex + '<span>' + p + '</span></li>'; }).join('') +
          '</ul></div>' +
          '<div class="j-col"><h3 class="j-h">What we take over</h3><p class="tier-inline">Text-back on every plan; live voice from Growth.</p><ul class="j-list j-fix">' +
            d.runs.map(function (r) { return '<li>' + check + '<span>' + r + '</span></li>'; }).join('') +
          '</ul></div>' +
        '</div>' +
      '</div></div>' +
    '</div></section>' +

    '<section class="band"><div class="wrap-narrow reveal" style="text-align:center">' +
      '<p class="kick" style="font-size:13px;font-weight:600;color:var(--blue-d);text-transform:uppercase;letter-spacing:.08em">The question we always get</p>' +
      '<h2 style="font-size:clamp(24px,3vw,34px);margin-top:14px">' + d.objection[0] + '</h2>' +
      '<p style="font-size:18px;color:var(--ink-soft);margin-top:18px">' + d.objection[1] + '</p>' +
    '</div></section>' +

    '<section class="dark-band"><div class="wrap">' +
      '<div class="sec-head reveal"><h2>What changes in your week</h2>' +
      '<p>Not a longer to-do list &mdash; a shorter one.</p></div>' +
      '<div class="feat-grid" style="max-width:960px;margin:0 auto">' +
        '<div class="feat feat-dark reveal"><div class="ic" aria-hidden="true">&#128222;</div>' +
          '<h3>Your phone stops being a problem</h3>' +
          '<p>Every call and message is answered while you work &mdash; and the ones worth your time reach you with the details already taken.</p></div>' +
        '<div class="feat feat-dark reveal"><div class="ic" aria-hidden="true">&#127769;</div>' +
          '<h3>Your evenings come back</h3>' +
          '<p>No more catching up on quotes, follow-ups and invoices at 9pm. It went out hours ago, without you.</p></div>' +
        '<div class="feat feat-dark reveal"><div class="ic" aria-hidden="true">&#128197;</div>' +
          '<h3>Your slow stretches get worked</h3>' +
          '<p>Campaigns and check-ins go to the customers you already have, instead of the phone just going quiet.</p></div>' +
      '</div>' +
      '<p class="owner-note reveal">Why it&rsquo;s built this way: <strong>' + d.truth + '</strong></p>' +
    '</div></section>' +

    '<section class="band paper"><div class="wrap">' +
      '<div class="sec-head reveal"><p class="kick">Other blueprints</p><h2>Not quite your business?</h2></div>' +
      '<div class="ind-grid">' + others + '</div>' +
      '<p style="text-align:center;color:var(--ink-mut);font-size:14px;margin-top:26px" class="reveal">These are examples, not limits. <a href="demo.html" style="color:var(--blue);font-weight:600">Tell us what you do</a> and we&rsquo;ll build the blueprint around it.</p>' +
    '</div></section>' +

    '<section class="band"><div class="wrap">' +
      '<div class="sec-head reveal"><p class="kick">Questions</p><h2>' + d.label + ', answered</h2></div>' +
      '<div class="faq reveal">' +
        d.faqs.map(function (f) {
          return '<details><summary>' + f[0] + '<svg class="chev" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><polyline points="6 9 12 15 18 9"/></svg></summary><div class="a">' + f[1] + '</div></details>';
        }).join('') +
      '</div>' +
      '<p style="text-align:center;margin-top:30px" class="reveal"><a href="pricing.html" style="color:var(--blue);font-weight:600;font-size:16px">See what it costs &rarr;</a></p>' +
    '</div></section>' +

    '<section class="cta"><div class="wrap"><div class="cta-box reveal">' +
      '<h2>Let&rsquo;s shape your ' + d.label + ' blueprint</h2>' +
      '<p>15 minutes. We&rsquo;ll walk you through the version we&rsquo;d build for your business.</p>' +
      '<div class="hero-cta"><a href="demo.html?ind=' + d.slug + '" class="btn btn-onblue btn-lg">Book your free demo</a></div>' +
      '<p class="cta-phone">Or call <a href="tel:+18325557266">(832) 555-SANO</a> &mdash; a person picks up.</p>' +
    '</div></div></section>';
})();
</script>
<script src="shared.js"></script>
</body>
</html>
