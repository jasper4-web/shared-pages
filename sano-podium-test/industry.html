<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Industry blueprint | SANO Systems</title>
<meta name="description" content="Your industry's AI department, already built. We shape the blueprint to your business and run it for you." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
</head>
<body data-page="industries">
<div id="site-nav"></div>
<main id="ind-root"></main>
<div id="site-footer"></div>

<script src="industries.js"></script>
<script>
(function () {
  var IND = window.SANO_INDUSTRIES || [];
  var slug = new URLSearchParams(location.search).get('ind') || 'hvac';
  var d = IND.filter(function (x) { return x.slug === slug; })[0] || IND[0];
  document.title = 'SANO Systems for ' + d.label;

  var check = '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>';
  var ex = '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';

  var others = IND.filter(function (x) { return x.slug !== d.slug; }).slice(0, 4).map(function (i) {
    return '<a class="ind reveal" href="industry.html?ind=' + i.slug + '"><div class="em">' + i.em + '</div><h3>' + i.label + '</h3><p>' + i.tag + '</p><span class="more">See the blueprint →</span></a>';
  }).join('');

  document.getElementById('ind-root').innerHTML =
    /* HERO */
    '<section class="page-hero tint"><div class="wrap reveal">' +
      '<span class="eyebrow">' + d.em + ' ' + d.label + '</span>' +
      '<h1>' + d.headline + '</h1>' +
      '<p class="sub">' + d.sub + '</p>' +
      '<div class="hero-cta"><a href="demo.html" class="btn btn-blue btn-lg">Watch a demo</a>' +
      '<a href="#blueprint" class="btn btn-ghost btn-lg">See what\'s inside</a></div>' +
    '</div></section>' +

    /* PAIN vs RUN */
    '<section class="band"><div class="wrap">' +
      '<div class="sec-head reveal"><p class="kick">The honest picture</p><h2>What it looks like right now — and what we take over</h2></div>' +
      '<div class="journey open" style="margin-top:0"><div class="journey-body">' +
        '<div class="journey-grid">' +
          '<div class="j-col"><h4>What\'s costing you today</h4><ul class="j-list j-pain">' +
            d.pains.map(function (p) { return '<li>' + ex + '<span>' + p + '</span></li>'; }).join('') +
          '</ul></div>' +
          '<div class="j-col"><h4>What we run for you</h4><ul class="j-list j-fix">' +
            d.runs.map(function (r) { return '<li>' + check + '<span>' + r + '</span></li>'; }).join('') +
          '</ul></div>' +
        '</div>' +
      '</div></div>' +
    '</div></section>' +

    /* THE BLUEPRINT */
    '<section class="band paper" id="blueprint"><div class="wrap">' +
      '<div class="sec-head reveal"><span class="blueprint">✦ The ' + d.label + ' blueprint</span>' +
      '<h2 style="margin-top:16px">Already built. We shape it to you.</h2>' +
      '<p>We don\'t start from a blank page for every client. Your industry has a proven setup — we tailor it to how you actually work, then run it.</p></div>' +
      '<div class="feat-grid">' +
        d.blueprint.map(function (b, i) {
          return '<div class="feat reveal"><div class="ic">' + (i + 1) + '</div><h3 style="font-size:17px">' + b + '</h3></div>';
        }).join('') +
      '</div>' +
      '<p style="text-align:center;color:var(--ink-mut);font-size:15px;margin-top:34px;max-width:70ch;margin-inline:auto" class="reveal">' + d.season + '</p>' +
    '</div></section>' +

    /* OBJECTION */
    '<section class="band"><div class="wrap-narrow reveal" style="text-align:center">' +
      '<p class="kick" style="font-size:13px;font-weight:600;color:var(--blue-d);text-transform:uppercase;letter-spacing:.08em">The question we always get</p>' +
      '<h2 style="font-size:clamp(24px,3vw,34px);margin-top:14px">' + d.objection[0] + '</h2>' +
      '<p style="font-size:18px;color:var(--ink-soft);margin-top:18px">' + d.objection[1] + '</p>' +
    '</div></section>' +

    /* WHO DOES THE WORK */
    '<section class="dark-band"><div class="wrap">' +
      '<div class="sec-head reveal"><h2>Everyone else hands you a login.</h2>' +
      '<p>The tools aren\'t the hard part. Running them is.</p></div>' +
      '<div class="cmp reveal">' +
        '<div class="cmp-row head"><span class="lab">&nbsp;</span><span class="col-b">With a software tool</span><span class="col-a">With SANO Systems</span></div>' +
        '<div class="cmp-row"><span class="lab">Setting it up</span><span class="before"><span class="x">✕</span> You learn it and build it</span><span class="after"><span class="c">✓</span> We build it around your business</span></div>' +
        '<div class="cmp-row"><span class="lab">Running it daily</span><span class="before"><span class="x">✕</span> You, on top of your real job</span><span class="after"><span class="c">✓</span> We do. You never touch it</span></div>' +
        '<div class="cmp-row"><span class="lab">When AI changes</span><span class="before"><span class="x">✕</span> You keep up, or fall behind</span><span class="after"><span class="c">✓</span> Our problem, not yours</span></div>' +
        '<div class="cmp-row"><span class="lab">What you end up with</span><span class="before"><span class="x">✕</span> Another login you barely use</span><span class="after"><span class="c">✓</span> Your time back</span></div>' +
      '</div>' +
      '<p style="text-align:center;color:#8A8A93;font-size:15px;margin-top:26px" class="reveal">' + d.truth + '</p>' +
    '</div></section>' +

    /* FAQ */
    '<section class="band"><div class="wrap">' +
      '<div class="sec-head reveal"><p class="kick">Questions</p><h2>' + d.label + ', answered</h2></div>' +
      '<div class="faq reveal">' +
        d.faqs.map(function (f) {
          return '<details><summary>' + f[0] + '<svg class="chev" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg></summary><div class="a">' + f[1] + '</div></details>';
        }).join('') +
      '</div>' +
    '</div></section>' +

    /* OTHER INDUSTRIES */
    '<section class="band paper"><div class="wrap">' +
      '<div class="sec-head reveal"><p class="kick">Other blueprints</p><h2>Not quite your business?</h2></div>' +
      '<div class="ind-grid">' + others + '</div>' +
      '<p style="text-align:center;color:var(--ink-mut);font-size:14px;margin-top:26px" class="reveal">These are examples, not limits. <a href="demo.html" style="color:var(--blue);font-weight:600">Tell us what you do</a> and we\'ll build the blueprint around it.</p>' +
    '</div></section>' +

    /* CTA */
    '<section class="cta"><div class="wrap"><div class="cta-box reveal">' +
      '<h2>Let\'s take the AI off your plate.</h2>' +
      '<p>See the ' + d.label + ' department we\'d build for you — free, no commitment.</p>' +
      '<div class="hero-cta"><a href="demo.html" class="btn btn-onblue btn-lg">Watch a demo</a></div>' +
    '</div></div></section>';
})();
</script>
<script src="shared.js"></script>
</body>
</html>
