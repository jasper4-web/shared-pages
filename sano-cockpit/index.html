<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SANO Call Cockpit</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#000;--text:#F2EBE0;--muted:#B5AEA3;--blue:#0070F3;--blueb:#338EF7;--cyan:#00D4FF;--line:rgba(240,230,211,.14);--font:'Space Grotesk',system-ui,sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.glow{position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse 700px 460px at 50% 30%,rgba(0,112,243,.12),transparent 70%)}
.card{position:relative;z-index:1;width:100%;max-width:360px;background:#0b0b0e;border:1px solid var(--line);border-radius:14px;padding:30px 26px;text-align:center}
.kick{font-size:10.5px;letter-spacing:.24em;text-transform:uppercase;color:var(--muted)}
h1{font-size:22px;font-weight:600;margin:10px 0 4px;letter-spacing:-.01em}
h1 .g{background:linear-gradient(100deg,var(--cyan),var(--blueb));-webkit-background-clip:text;background-clip:text;color:transparent}
p.s{color:var(--muted);font-size:13px;margin-bottom:20px}
input{width:100%;background:#000;border:1px solid var(--line);border-radius:9px;color:var(--text);font-family:var(--font);font-size:16px;padding:12px 14px;text-align:center;letter-spacing:.05em}
input:focus{outline:none;border-color:var(--blueb)}
button{width:100%;margin-top:12px;background:rgba(0,112,243,.16);border:1px solid var(--blueb);color:#fff;font-family:var(--font);font-size:15px;font-weight:600;padding:12px;border-radius:9px;cursor:pointer;transition:.2s}
button:hover{background:rgba(0,112,243,.28)}
.err{color:#ea8a8a;font-size:12.5px;margin-top:12px;min-height:16px}
.lock{font-size:26px;margin-bottom:6px}
</style></head><body>
<div class="glow"></div>
<div class="card">
  <div class="lock">🔒</div>
  <div class="kick">SANO Systems · Private</div>
  <h1>Call <span class="g">Cockpit</span></h1>
  <p class="s">Enter the password to unlock your call list.</p>
  <form id="f">
    <input id="pw" type="password" placeholder="Password" autocomplete="current-password" autofocus>
    <button type="submit" id="go">Unlock</button>
  </form>
  <div class="err" id="err"></div>
</div>

  try{
