<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FRUITS — Results Dashboard (private)</title>
<style>
  :root{--cream:#f4eee1;--card:#fffdf7;--ink:#2c2a24;--muted:#8a836f;--line:#e2d9c4;--sage:#5f7d4f;--berry:#a83f57;--gold:#b0863a}
  *{box-sizing:border-box}
  body{margin:0;background:var(--cream);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;line-height:1.5}
  .wrap{max-width:1000px;margin:0 auto;padding:24px 18px 80px}
  h1{font-family:Georgia,serif;font-size:26px;margin:0 0 2px}
  .sub{color:var(--muted);font-size:14px}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin:16px 0}
  textarea{width:100%;height:90px;border:1.5px solid var(--line);border-radius:10px;padding:10px;font-family:ui-monospace,monospace;font-size:12px;background:#fbf7ec;color:#5f5949}
  button{border:1px solid var(--ink);background:var(--ink);color:#fff;border-radius:10px;padding:9px 16px;font-size:14px;font-weight:600;cursor:pointer}
  button.ghost{background:transparent;color:var(--ink);border-color:var(--line);font-weight:500}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .tabs{display:flex;gap:6px;margin:18px 0 8px;flex-wrap:wrap}
  .tab{padding:8px 14px;border-radius:20px;border:1px solid var(--line);background:var(--card);cursor:pointer;font-size:14px}
  .tab.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  table{width:100%;border-collapse:collapse;font-size:14px}
  th,td{text-align:left;padding:8px 8px;border-bottom:1px solid var(--line);vertical-align:middle}
  th{color:var(--muted);font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.5px;cursor:pointer}
  td.n{text-align:center;font-variant-numeric:tabular-nums}
  .th{width:56px;height:42px;object-fit:cover;border-radius:6px;border:1px solid var(--line);display:block}
  .rank{font-weight:700;color:var(--gold);width:26px}
  .pill{display:inline-block;padding:1px 8px;border-radius:20px;font-size:12px;font-weight:600}
  .love{background:#f7e4e9;color:var(--berry)}.like{background:#e7efdf;color:var(--sage)}.pass{background:#eee;color:#7a7366}
  .score{font-weight:700}
  .note{border-left:3px solid var(--gold);padding:6px 10px;margin:6px 0;background:#fbf7ec;border-radius:0 8px 8px 0;font-size:14px}
  .note .who{color:var(--muted);font-size:12px}
  .who-card{border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin:8px 0;background:var(--card)}
  .empty{color:var(--muted);text-align:center;padding:30px}
  h3{font-size:15px;margin:16px 0 6px}
</style>
</head>
<body>
<div class="wrap">
  <h1>FRUITS — results dashboard</h1>
  <p class="sub">Private. Paste the code a friend texted you, tap add, and their votes fold into the totals. Saved in this browser.</p>

  <div class="panel">
    <div class="sub" style="margin-bottom:6px">Paste one or more friend messages here (I'll find the codes automatically):</div>
    <textarea id="paste" placeholder="Paste a friend's message… it contains something like FRUITS-VOTES-v1[....]"></textarea>
    <div class="row" style="margin-top:10px">
      <button onclick="addPasted()">Add responses</button>
      <button class="ghost" onclick="exportCsv()">Export CSV</button>
      <button class="ghost" onclick="clearAll()">Clear all</button>
      <span class="sub" id="status" style="margin-left:auto"></span>
    </div>
  </div>

  <div class="tabs" id="tabs">
    <div class="tab on" data-t="board" onclick="setTab('board')">Leaderboard</div>
    <div class="tab" data-t="notes" onclick="setTab('notes')">Notes</div>
    <div class="tab" data-t="people" onclick="setTab('people')">By person</div>
  </div>
  <div id="view"></div>
</div>

0b7 Option 1\",\n\"group\": \"H\",\n\"img\": \"img/H-48_logo-hero-engraved_v1.jpg\"\n},\n{\n\"id\": \"H-48 v2\",\n\"name\": \"Logo Hero Engraved \\u00b7 Option 2\",\n\"group\": \"H\",\n\"img\": \"img/H-48_logo-hero-engraved_v2.jpg\"\n},\n{\n\"id\": \"H-48 v3\",\n\"name\": \"Logo Hero Engraved \\u00b7 Option 3\",\n\"group\": \"H\",\n\"img\": \"img/H-48_logo-hero-engraved_v3.jpg\"\n},\n{\n\"id\": \"H-49 v1\",\n\"name\": \"Logo Hero Waxseal \\u00b7 Option 1\",\n\"group\": \"H\",\n\"img\": \"img/H-49_logo-hero-waxseal_v1.jpg\"\n},\n{\n\"id\": \"H-49 v2\",\n\"name\": \"Logo Hero Waxseal \\u00b7 Option 2\",\n\"group\": \"H\",\n\"img\": \"img/H-49_logo-hero-waxseal_v2.jpg\"\n},\n{\n\"id\": \"H-49 v3\",\n\"name\": \"Logo Hero Waxseal \\u00b7 Option 3\",\n\"group\": \"H\",\n\"img\": \"img/H-49_logo-hero-waxseal_v3.jpg\"\n}\n]");
const MK={}; MANIFEST.forEach(m=>MK[m.id]=m);
const DKEY='fruits_dash_v1';
let R = load();            // array of responses {name, votes, notes, done, total, raw}
let tab='board';
function load(){ try{return JSON.parse(localStorage.getItem(DKEY))||[]}catch(e){return[]} }
function persist(){ localStorage.setItem(DKEY, JSON.stringify(R)); }

function decode(b64){ return JSON.parse(decodeURIComponent(atob(b64))); }
function addPasted(){
  const txt=document.getElementById('paste').value;
  const re=/FRUITS-VOTES-v1\[([\s\S]*?)\]/g; let m,added=0,dupe=0,bad=0;
  while((m=re.exec(txt))){
    try{
      const o=decode(m[1].replace(/\s+/g,''));
      const nm=(o.name||'').trim();
      const sig=nm.toLowerCase()+'|'+JSON.stringify(o.votes);
      if(R.some(r=>r.sig===sig)){dupe++;continue;}
      const rec={name:nm||'Anonymous', votes:o.votes||{}, notes:o.notes||{}, done:o.done||Object.keys(o.votes||{}).length, total:o.total||MANIFEST.length, sig};
      if(nm){ const i=R.findIndex(r=>r.name.trim().toLowerCase()===nm.toLowerCase()); if(i>=0){ R[i]=rec; added++; continue; } }
      R.push(rec); added++;
    }catch(e){bad++;}
  }
  persist(); document.getElementById('paste').value='';
  document.getElementById('status').textContent = added+' added'+(dupe?', '+dupe+' duplicate':'')+(bad?', '+bad+' unreadable':'');
  render();
}
function clearAll(){ if(confirm('Clear all collected responses?')){ R=[]; persist(); render(); } }
function setTab(t){ tab=t; document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('on',x.dataset.t===t)); render(); }

function tally(){
  const agg={}; MANIFEST.forEach(m=>agg[m.id]={id:m.id,L:0,Y:0,N:0});
  R.forEach(r=>{ for(const id in r.votes){ if(!agg[id])continue; const v=r.votes[id]; if(v==='L')agg[id].L++;else if(v==='Y')agg[id].Y++;else agg[id].N++; } });
  const arr=Object.values(agg).map(a=>({...a, seen:a.L+a.Y+a.N, score:2*a.L+a.Y-a.N}));
  arr.sort((a,b)=> b.score-a.score || b.L-a.L || b.Y-a.Y);
  return arr;
}
let sortKey='score';
function render(){
  const v=document.getElementById('view');
  if(R.length===0){ v.innerHTML='<div class="empty">No responses yet. Paste a friend’s code above to begin.</div>'; return; }
  if(tab==='board') return renderBoard(v);
  if(tab==='notes') return renderNotes(v);
  return renderPeople(v);
}
function renderBoard(v){
  const arr=tally();
  const rows=arr.map((a,i)=>{ const m=MK[a.id]||{name:a.id,img:''};
    return '<tr><td class="rank">'+(i+1)+'</td>'+
      '<td><img class="th" loading="lazy" src="'+m.img+'"></td>'+
      '<td><b>'+m.name+'</b><br><span class="sub">'+a.id+'</span></td>'+
      '<td class="n"><span class="pill love">'+a.L+'</span></td>'+
      '<td class="n"><span class="pill like">'+a.Y+'</span></td>'+
      '<td class="n"><span class="pill pass">'+a.N+'</span></td>'+
      '<td class="n score">'+a.score+'</td></tr>';
  }).join('');
  v.innerHTML='<div class="sub" style="margin:4px 0 8px">'+R.length+' responses · score = love×2 + like − pass · sorted best first</div>'+
    '<div style="overflow-x:auto"><table><thead><tr><th></th><th></th><th>Design</th><th class="n">♥</th><th class="n">Like</th><th class="n">Pass</th><th class="n">Score</th></tr></thead><tbody>'+rows+'</tbody></table></div>';
}
function renderNotes(v){
  const byId={}; R.forEach(r=>{ for(const id in r.notes){ (byId[id]=byId[id]||[]).push({who:r.name,txt:r.notes[id]}); } });
  const ids=Object.keys(byId); if(ids.length===0){ v.innerHTML='<div class="empty">No notes yet.</div>'; return; }
  ids.sort((a,b)=>byId[b].length-byId[a].length);
  v.innerHTML=ids.map(id=>{ const m=MK[id]||{name:id,img:''};
    return '<div class="who-card"><div class="row" style="gap:12px"><img class="th" style="width:70px;height:52px" src="'+m.img+'"><div><b>'+esc(m.name)+'</b> <span class="sub">'+esc(id)+'</span></div></div>'+
      byId[id].map(n=>'<div class="note">'+esc(n.txt)+'<div class="who">— '+esc(n.who)+'</div></div>').join('')+'</div>';
  }).join('');
}
function renderPeople(v){
  v.innerHTML=R.map((r,i)=>{ let L=0,Y=0,N=0; for(const k in r.votes){const x=r.votes[k];if(x==='L')L++;else if(x==='Y')Y++;else N++;}
    const nn=Object.keys(r.notes).length;
    return '<div class="who-card"><div class="row"><b style="font-size:16px">'+esc(r.name)+'</b>'+
      '<span class="sub">rated '+(L+Y+N)+' / '+r.total+'</span>'+
      '<span style="margin-left:auto"><span class="pill love">'+L+' ♥</span> <span class="pill like">'+Y+' like</span> <span class="pill pass">'+N+' pass</span> '+(nn?'<span class="sub">'+nn+' notes</span>':'')+'</span>'+
      '<button class="ghost" style="margin-left:8px" onclick="delOne('+i+')">remove</button></div></div>';
  }).join('');
}
function delOne(i){ R.splice(i,1); persist(); render(); }
function esc(s){ return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
function exportCsv(){
  const arr=tally(); let csv='id,name,love,like,pass,seen,score\n';
  const safe=s=>{s=(s||'').replace(/"/g,'""'); return /^[=+\-@\t\r]/.test(s)?"'"+s:s;};
  arr.forEach(a=>{ const m=MK[a.id]||{name:a.id}; csv+=[a.id,'"'+safe(m.name)+'"',a.L,a.Y,a.N,a.seen,a.score].join(',')+'\n'; });
  const b=new Blob([csv],{type:'text/csv'}); const u=URL.createObjectURL(b);
  const a=document.createElement('a'); a.href=u; a.download='fruits-results.csv'; a.click(); URL.revokeObjectURL(u);
}
render();
</script>
